# Deployment mode - "ds" for DaemonSet, "deploy" for Deployment. 
# If you don't want to use a loadbalancer for the DaemonSet variant, disable it in loadbalancer.yaml
mode: "deploy"
# Use proxy protocol inbound (must also be configured in ../loadbalancer.yaml) to the ingress controller.
option: proxy-protocol
ssl_nodeport: 30443
http_nodeport: 30080